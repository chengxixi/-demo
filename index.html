  <body>
    <div id="root"></div>
    <script>
      (() => {
        const sortModelRankTable = () => {
          const tbody = document.querySelector(".model-rank-table tbody");
          if (!tbody) return false;

          const rows = Array.from(tbody.querySelectorAll("tr"));
          rows
            .sort((left, right) => {
              const leftValue = Number((left.children[3]?.textContent || "").replace(/,/g, "")) || 0;
              const rightValue = Number((right.children[3]?.textContent || "").replace(/,/g, "")) || 0;
              return rightValue - leftValue;
            })
            .forEach((row, index) => {
              const rankCell = row.children[0];
              if (rankCell) rankCell.textContent = String(index + 1);
              tbody.appendChild(row);
            });

          return true;
        };

        if (sortModelRankTable()) return;

        const observer = new MutationObserver(() => {
          if (!sortModelRankTable()) return;
          observer.disconnect();
        });

        observer.observe(document.body, { childList: true, subtree: true });
      })();

      (() => {
        const byText = (selector, text) =>
          Array.from(document.querySelectorAll(selector)).find((node) => node.textContent.trim() === text);

        const ensureInternalSearch = () => {
          const filterBar = document.querySelector(".filter-bar");
          if (!filterBar || filterBar.querySelector("[data-local-model-search]")) return Boolean(filterBar);

          const field = document.createElement("div");
          field.className = "local-model-search-field";
          field.dataset.localModelSearch = "true";
          field.innerHTML = '<label for="internal-model-search">内部型号/料号</label><input id="internal-model-search" type="search" placeholder="搜索内部型号或料号" autocomplete="off" />';
          filterBar.appendChild(field);
          return true;
        };

        const formulaTexts = new Map([
          ["退货率", "计算公式：退货量/销量"],
          ["反馈率", "计算公式：反馈量/销量"],
          ["闭环率", "计算公式：反馈单据关闭数量/总反馈量（关闭指关闭、转需求、转异常或直接关闭）"],
          ["响应达成率", "计算公式：P0/P1/P2/P3异常在规定时间内响应的达成情况"],
          ["异常占比", "计算公式：产生的异常数量/反馈总数"],
          ["差评率", "计算公式：差评数量/评论总数"],
          ["产品型号表现 TOP10", "统计口径：按当前筛选条件下的反馈量从大到小排名"],
          ["退货率 vs 反馈率", "计算公式：退货率=退货量/销量；反馈率=反馈量/销量"],
          ["反馈趋势", "统计口径：按时间周期汇总反馈量、退货率和差评率"],
          ["问题分类分布", "统计口径：分类反馈量/总反馈量"],
          ["问题层级分布", "统计口径：对应层级反馈量/总反馈量"],
        ]);

        const attachFormulaPopover = (target, text) => {
          if (!target || target.dataset.formulaReady === "true") return Boolean(target);

          target.dataset.formulaReady = "true";
          target.classList.add("has-formula-help");
          const popover = document.createElement("div");
          popover.className = "formula-popover";
          popover.textContent = text;
          target.appendChild(popover);

          return true;
        };

        const ensureFormulaPopovers = () => {
          const results = [];
          document.querySelectorAll(".metric-card").forEach((card) => {
            const label = card.querySelector(".metric-label")?.textContent.trim();
            const text = formulaTexts.get(label);
            if (text) results.push(attachFormulaPopover(card, text));
          });

          formulaTexts.forEach((text, label) => {
            if (["退货率", "反馈率", "闭环率", "响应达成率", "异常占比", "差评率"].includes(label)) return;
            const title = Array.from(document.querySelectorAll(".panel-title, h2, h3")).find((node) =>
              node.textContent.includes(label)
            );
            const panel = title?.closest(".panel, section, article");
            if (panel) results.push(attachFormulaPopover(panel, text));
          });

          return results.length > 0;
        };

        const metricSets = {
          mom: [
            ["4.38%", "-0.72%"],
            ["12.67%", "-1.34%"],
            ["87.45%", "+3.21%"],
            ["92.16%", "+4.57%"],
            ["6.72%", "+0.89%"],
            ["3.25%", "-0.31%"],
          ],
          yoy: [
            ["4.91%", "+0.48%"],
            ["13.24%", "+2.06%"],
            ["86.03%", "-1.18%"],
            ["89.74%", "+1.92%"],
            ["7.18%", "+1.16%"],
            ["3.62%", "+0.27%"],
          ],
        };

        const applyMetricSet = (type) => {
          const cards = Array.from(document.querySelectorAll(".metric-card"));
          metricSets[type].forEach(([value, delta], index) => {
            const card = cards[index];
            if (!card) return;
            const valueNode = Array.from(card.querySelectorAll("*")).find((node) => /^\d+(\.\d+)?%$/.test(node.textContent.trim()));
            const deltaNode = Array.from(card.querySelectorAll("*")).find((node) => /^[+-]\d+(\.\d+)?%$/.test(node.textContent.trim()));
            if (valueNode) valueNode.textContent = value;
            if (deltaNode) {
              deltaNode.textContent = delta;
              deltaNode.classList.toggle("bad-text", delta.startsWith("+") && index === 4);
              deltaNode.classList.toggle("good-text", !delta.startsWith("+") || index !== 4);
            }
          });
        };

        const wireCompareButtons = () => {
          const yoyButton = byText("button", "同比");
          const momButton = byText("button", "环比");
          if (!yoyButton || yoyButton.dataset.compareReady === "true") return Boolean(yoyButton);

          yoyButton.dataset.compareReady = "true";
          yoyButton.addEventListener("click", () => setTimeout(() => applyMetricSet("yoy"), 0));
          if (momButton) momButton.addEventListener("click", () => setTimeout(() => applyMetricSet("mom"), 0));
          return true;
        };

        const wireFormulaClick = () => {
          if (document.body.dataset.formulaClickReady === "true") return true;
          document.body.dataset.formulaClickReady = "true";

          document.addEventListener("click", (event) => {
            const source = event.target.nodeType === 1 ? event.target : event.target.parentElement;
            const target = source?.closest(".has-formula-help");
            const visiblePopovers = document.querySelectorAll(".formula-popover.visible");

            if (!target) {
              visiblePopovers.forEach((node) => node.classList.remove("visible"));
              return;
            }

            const rect = target.getBoundingClientRect();
            const clickedHelpArea = event.clientX > rect.right - 64 && event.clientY < rect.top + 56;
            const clickedMetricCard = target.classList.contains("metric-card");
            const clickedLabel = source?.closest(".metric-label");
            const clickedTitle = source?.closest(".panel-title, h2, h3");
            if (!clickedHelpArea && !clickedMetricCard && !clickedLabel && !clickedTitle) return;

            const popover = target.querySelector(".formula-popover");
            if (!popover) return;
            visiblePopovers.forEach((node) => {
              if (node !== popover) node.classList.remove("visible");
            });
            popover.classList.toggle("visible");
          }, true);

          return true;
        };

        const enhance = () => {
          const ready = [
            ensureInternalSearch(),
            ensureFormulaPopovers(),
            wireFormulaClick(),
            wireCompareButtons(),
          ];
          return ready.every(Boolean);
        };

        if (enhance()) return;

        const observer = new MutationObserver(() => {
          enhance();
        });

        observer.observe(document.body, { childList: true, subtree: true });
      })();

      (() => {
        if (window.__localInternalSearchReady) return;
        window.__localInternalSearchReady = true;

        const extraRows = [
          ["YB-CS10 入门体脂秤", "2,116", "286", "4.36%", "3.04%", "4.4分"],
          ["YB-BF511 八电极体脂秤", "1,984", "251", "4.09%", "2.92%", "4.5分"],
          ["YB-MS30 深层筋膜枪", "1,736", "218", "3.87%", "2.75%", "4.3分"],
          ["YB-S30 人体秤", "1,514", "176", "3.62%", "2.41%", "4.6分"],
          ["YB-F2 智能体脂秤 F2", "1,206", "139", "3.44%", "2.18%", "4.5分"],
        ];

        const internalModelMap = new Map([
          ["YB-S100 八电极体脂秤", ["YL-S100-8", "PN-S100-8E"]],
          ["YB-201 人体成分秤", ["YL-201-BIA", "PN-201-B"]],
          ["YB-301 体脂秤 Pro", ["YL-301-PRO", "PN-301-P"]],
          ["YB-M3 筋膜枪 M3 Pro", ["YL-M3-PRO", "PN-M3-MASS"]],
          ["YB-F1 智能体脂秤 F1", ["YL-F1-SCALE", "PN-F1-BIA"]],
          ["YB-CS10 入门体脂秤", ["YL-CS10-4", "PN-CS10-4E"]],
          ["YB-BF511 八电极体脂秤", ["YL-BF511-8", "PN-BF511"]],
          ["YB-MS30 深层筋膜枪", ["YL-MS30", "PN-MS30-MASS"]],
          ["YB-S30 人体秤", ["YL-S30", "PN-S30-WT"]],
          ["YB-F2 智能体脂秤 F2", ["YL-F2-SCALE", "PN-F2-BIA"]],
        ]);

        const normalize = (value) => String(value || "").trim().toLowerCase();

        const getModelName = (row) => row.querySelector(".model-name")?.textContent.trim() || row.children[1]?.textContent.trim() || "";

        const ensureClearButton = (input) => {
          const field = input.closest(".local-model-search-field");
          if (!field || field.querySelector("[data-local-clear-model-search]")) return;

          const button = document.createElement("button");
          button.type = "button";
          button.dataset.localClearModelSearch = "true";
          button.setAttribute("aria-label", "清空内部型号/料号搜索");
          button.textContent = "×";
          button.addEventListener("click", () => {
            input.value = "";
            input.dispatchEvent(new Event("input", { bubbles: true }));
            input.focus();
          });
          field.appendChild(button);
        };

        const ensureTop10Rows = (tbody) => {
          let changed = false;
          const currentModels = new Set(Array.from(tbody.querySelectorAll("tr")).map(getModelName));
          extraRows.forEach((cells) => {
            if (currentModels.has(cells[0])) return;

            const row = document.createElement("tr");
            row.dataset.localAddedModelRow = "true";
            row.innerHTML = `<td></td>${cells.map((cell, index) => `<td${index === 0 ? ' class="model-name"' : ""}>${cell}</td>`).join("")}`;
            tbody.appendChild(row);
            changed = true;
          });
          return changed;
        };

        const ensureInternalColumn = (table) => {
          const headRow = table.querySelector("thead tr");
          if (!headRow || headRow.dataset.localInternalReady === "true") return false;

          headRow.dataset.localInternalReady = "true";
          const header = document.createElement("th");
          header.textContent = "内部型号/料号";
          headRow.insertBefore(header, headRow.children[2] || null);
          return true;
        };

        const ensureInternalCells = (tbody) => {
          let changed = false;
          Array.from(tbody.querySelectorAll("tr:not(.local-no-result-row)")).forEach((row) => {
            if (row.dataset.localInternalCellReady === "true") return;

            const modelName = getModelName(row);
            const [internal, partNo] = internalModelMap.get(modelName) || ["待补充", "待补充"];
            const cell = document.createElement("td");
            cell.className = "local-internal-cell";
            cell.innerHTML = `${internal}<span>${partNo}</span>`;
            row.dataset.localSearchText = normalize(`${modelName} ${internal} ${partNo}`);
            row.dataset.localInternalCellReady = "true";
            row.insertBefore(cell, row.children[2] || null);
            changed = true;
          });
          return changed;
        };

        const sortVisibleRows = (table, tbody) => {
          if (table.dataset.localInternalSorted === "true") return;
          const rows = Array.from(tbody.querySelectorAll("tr:not(.local-no-result-row)"));
          rows
            .sort((left, right) => {
              const leftValue = Number((left.children[4]?.textContent || "").replace(/,/g, "")) || 0;
              const rightValue = Number((right.children[4]?.textContent || "").replace(/,/g, "")) || 0;
              return rightValue - leftValue;
            })
            .forEach((row) => tbody.appendChild(row));
          table.dataset.localInternalSorted = "true";
        };

        const applyInternalSearch = () => {
          const input = document.querySelector("#internal-model-search");
          const tbody = document.querySelector(".model-rank-table tbody");
          if (!input || !tbody) return false;

          const field = input.closest(".local-model-search-field");
          const query = normalize(input.value);
          let visibleRank = 0;
          tbody.querySelector(".local-no-result-row")?.remove();

          Array.from(tbody.querySelectorAll("tr:not(.local-no-result-row)")).forEach((row) => {
            const matched = !query || row.dataset.localSearchText.includes(query);
            row.classList.toggle("local-hidden", !matched);
            if (!matched) return;

            visibleRank += 1;
            const rankCell = row.children[0];
            if (rankCell) rankCell.textContent = String(visibleRank);
          });

          field?.classList.toggle("has-value", Boolean(query));
          if (visibleRank > 0) return true;

          const noResult = document.createElement("tr");
          noResult.className = "local-no-result-row";
          noResult.innerHTML = '<td colspan="8">未找到匹配的内部型号或料号</td>';
          tbody.appendChild(noResult);
          return true;
        };

        const wireInternalModelSearch = () => {
          const table = document.querySelector(".model-rank-table");
          const tbody = table?.querySelector("tbody");
          const input = document.querySelector("#internal-model-search");
          if (!table || !tbody || !input) return false;

          ensureClearButton(input);
          const changed = [
            ensureTop10Rows(tbody),
            ensureInternalColumn(table),
            ensureInternalCells(tbody),
          ].some(Boolean);
          if (changed) table.dataset.localInternalSorted = "false";
          sortVisibleRows(table, tbody);

          if (input.dataset.localSearchReady !== "true") {
            input.dataset.localSearchReady = "true";
            input.placeholder = "搜索 YL-CS20A-8 或 PN-BF511";
            input.addEventListener("input", applyInternalSearch);
          }

          applyInternalSearch();

          raw: row.children[9]?.textContent.trim() || row.querySelector(".truncate")?.textContent.trim() || "",
          ai: row.children[10]?.textContent.trim() || "",
          level1: row.children[11]?.textContent.trim() || "",
          level2: row.children[12]?.textContent.trim() || "",
          level3: row.children[13]?.textContent.trim() || "",
          sentiment: row.children[14]?.textContent.trim() || "",
          returned: row.children[15]?.textContent.trim() || "",
          exception: row.children[16]?.textContent.trim() || "",
          processRoute: row.children[17]?.textContent.trim() || "待处理",
          processState: row.children[17]?.textContent.includes("已") ? "已处理" : "待处理",
          feedbackUser: row.children[18]?.textContent.trim() || "",
          handler: row.children[19]?.textContent.trim() || "",
          date: row.children[20]?.textContent.trim() || "",
        });

        const scoreConfidence = (row) => {
          const source = row.children[2]?.textContent.trim();
          const raw = row.querySelector(".truncate")?.textContent.trim() || "";
          const model = row.children[6]?.textContent.trim() || "";
          let confidence = source === "APP反馈" ? 0.54 : 0.74;
          if (/crash|闪退|无法|不准|broken|裂/.test(raw.toLowerCase())) confidence -= 0.08;
          if (/CS20A|CS30B|MG20/.test(model)) confidence += 0.04;
          if (source === "商品评论" && /not|stopped|very different|cracked/i.test(raw)) confidence -= 0.03;
          return Math.max(0.34, Math.min(0.96, confidence));
        };

        const getDemoConfidence = (data) => data.processState === "待人工复核" ? 0.54 : 0.78;

        const rowSimilarity = (a, b) => {
          const sameModel = a.model === b.model || a.internal === b.internal;
          const sameBrand = a.brand === b.brand;
          const sameSource = a.source === b.source;
          const rawA = normalize(a.raw);
          const rawB = normalize(b.raw);
          const shared = [a.model, a.internal, a.brand].filter(Boolean).some((token) => rawA.includes(normalize(token)) && rawB.includes(normalize(token)));
          return (sameModel ? 0.5 : 0) + (sameBrand ? 0.15 : 0) + (sameSource ? 0.15 : 0) + (shared ? 0.2 : 0);
        };

        const buildMergedFeedback = (rows) => {
          const seedRows = localFeedbackData.length ? localFeedbackData : rows.map(getRowData);
          const items = seedRows.map((data) => ({ data: normalizeExceptionRoute(data), confidence: getDemoConfidence(data) }));
          const groups = [];
          items.forEach((item) => {
            if (isExceptionPoolItem(item.data)) {
              groups.push({ mergeGroup: "", lead: item, members: [item], expanded: false });
              return;
            }
            let bucket = item.data.mergeGroup
              ? groups.find((group) => group.mergeGroup === item.data.mergeGroup && getProductLineCode(group.lead.data) === getProductLineCode(item.data))
              : null;
            if (!bucket) {
              bucket = { mergeGroup: item.data.mergeGroup || "", lead: item, members: [item], expanded: false };
              groups.push(bucket);
            } else {
              bucket.members.push(item);
            }
          });
          return groups;
        };

        const getCreateMode = (data, confidence, index = 0) => {
          if (data.source === "站内信" || data.source === "客服沟通") return "manual";
          if (confidence < 0.6 && index % 2 === 1) return "manual";
          return "ai";
        };

        const getMergeTitle = (group) => {
          const data = group.lead.data;
          const issue = data.level3 || data.level2 || data.raw || "相似反馈";
          return `${data.model || data.internal || data.productType} ${issue}合并反馈`;
        };

        const getModeBadge = (mode, confidence) => {
          if (mode === "manual") return '<span class="local-badge manual">人工录入</span>';
          return '<span class="local-badge ai">AI自动创建</span>';
        };

        const getModeLabel = (data, confidence, index = 0) => {
          if (data.createMode === "人工录入") return "人工录入";
          if (data.createMode === "AI自动创建") return "AI自动创建";
          const mode = getCreateMode(data, confidence, index);
          if (mode === "manual") return "人工录入";
          return "AI自动创建";
        };

        const getRegion = (data) => data.site === "Amazon.com (US)" ? "海外" : "国内";
        const getDataSource = (data) => {
          if (data.source === "退货原因") return getRegion(data) === "海外" ? "海外电商-退货反馈" : "国内电商-退货反馈";
          if (data.source === "商品评论") return getRegion(data) === "海外" ? "海外电商-商品评论" : "国内电商-商品评论";
          return data.source;
        };
        const getDeviceType = (data) => data.productType === "体脂秤" ? "八电极" : data.productType;
        const getProductLineCode = (data) => {
          const deviceType = getDeviceType(data);
          if (deviceType === "筋膜枪") return "CM";
          if (deviceType === "八电极" || deviceType === "体脂秤") return "CS";
          return "CS";
        };
        const isExceptionPoolItem = (data) => ["P0", "P1"].includes(String(data.exception || "").toUpperCase());
        const normalizeExceptionRoute = (data) => {
          if (!isExceptionPoolItem(data)) return data;
          data.mergeGroup = "";
          data.processRoute = "已转异常";
          data.processState = "已处理";
          data.handler = "系统";
          return data;
        };
        const getMergeDisplayId = (group) => {
          const data = group.lead.data;
          const date = (data.id.match(/\d{8}/)?.[0] || (data.date || "").replace(/-/g, "") || "20260618");
          return `${getProductLineCode(data)}-${date}-合并（${group.members.length}条数据）`;
        };
        const getGroupField = (group, key, mixedLabel) => {
          const values = Array.from(new Set(group.members.map((member) => member.data[key]).filter(Boolean)));
          return values.length <= 1 ? (values[0] || "") : mixedLabel;
        };
        const matchesUserScope = (data) => {
          if (currentUser.scope === "all") return true;
          if (currentUser.scope === "line:CM") return getProductLineCode(data) === "CM";
          if (currentUser.scope === "line:CS") return getProductLineCode(data) === "CS";
          if (currentUser.scope === "region:海外") return getRegion(data) === "海外";
          if (currentUser.scope === "region:国内") return getRegion(data) === "国内";
          return true;
        };
        const getSolution = (data) => {
          if (data.processRoute === "待处理") return "待产品经理确认处理方案";
          if (data.processRoute === "已转工单") return "已转工单跟进质量排查";
          if (data.processRoute === "已转需求") return "已转需求池评审";
          if (data.processRoute === "已转异常") return "已转异常处理流程";
          if (data.processRoute === "已转Q&A") return "已沉淀至Q&A案例库";
          return "已直接回复并关闭";
        };
        const getExpressNo = (data) => data.returned === "退货" || data.returned === "换货" || data.returned === "退货+换货" ? `RT-${data.id.replace(/[^0-9]/g, "").slice(-8)}` : "";
        const getExcelRow = (data) => ({
          region: getRegion(data),
          dataSource: getDataSource(data),
          deviceType: getDeviceType(data),
          orderNo: data.asin && data.asin !== "-" ? data.asin : data.id.replace("FB-", "ORD-"),
          expressNo: getExpressNo(data),
          image: "",
          video: "",
          solution: getSolution(data),
          addedAt: data.date,
        });

        const allFeedbackItems = () => localFeedbackData;
        const findFeedbackById = (id) => allFeedbackItems().find((item) => item.id === id) || null;
        const getCurrentGroups = () => buildMergedFeedback([]);
        const findMergeGroupById = (id) => getCurrentGroups().find((group) => group.members.length > 1 && group.members.some((member) => member.data.id === id));
        const getWorkOrderId = (data) => `TK-${(data.id.match(/\d{8}/)?.[0] || "20260618")}-${data.id.replace(/\D/g, "").slice(-4)}`;
        const getWorkOrderFeedbackIds = (order) => order.feedbackIds || String(order.relatedFeedback || "").split(/[、,/\s]+/).filter(Boolean);
        const createAiWorkOrderSummary = (items) => {
          const validItems = items.filter(Boolean);
          if (!validItems.length) return "待补充工单摘要";
          const first = validItems[0];
          const issue = first.level3 || first.level2 || "反馈问题";
          const product = first.model || first.productType || "产品";
          if (validItems.length === 1) return `${product}${issue}处理`;
          const sources = Array.from(new Set(validItems.map((item) => item.source).filter(Boolean))).slice(0, 2).join("、");
          return `${product}${issue}等${validItems.length}条反馈合并处理${sources ? `（${sources}）` : ""}`;
        };
        const getMergedWorkOrderId = (items) => {
          const first = items[0] || {};
          const date = first.id?.match(/\d{8}/)?.[0] || "20260618";
          return `TK-${date}-${String(localWorkOrders.length + 1).padStart(4, "0")}`;
        };
        const addWorkOrderFromFeedback = (data) => {
          if (!data || localWorkOrders.some((item) => getWorkOrderFeedbackIds(item).includes(data.id))) return;
          localWorkOrders.unshift({
            id: getWorkOrderId(data),
            summary: createAiWorkOrderSummary([data]),
            relatedFeedback: data.id,
            feedbackIds: [data.id],
            status: "转工单",
            owner: data.handler || "待分派",
            dept: getProductLineCode(data) === "CM" ? "筋膜枪产品线" : "八电极产品线",
            sla: "48h 00m",
            result: data.level3 || "待补充处理方案",
            closeReason: "-",
            exception: "否",
            requirement: "否",
            step: 1,
          });
        };
        const addMergedWorkOrderFromFeedbacks = (items) => {
          const validItems = items.filter(Boolean);
          if (!validItems.length) return;
          if (validItems.length === 1) {
            addWorkOrderFromFeedback(validItems[0]);
            return;
          }
          const ids = validItems.map((item) => item.id);
          const sortedKey = ids.slice().sort().join("|");
          if (localWorkOrders.some((order) => getWorkOrderFeedbackIds(order).slice().sort().join("|") === sortedKey)) return;
          const first = validItems[0];
          localWorkOrders.unshift({
            id: getMergedWorkOrderId(validItems),
            summary: createAiWorkOrderSummary(validItems),
            relatedFeedback: `${getProductLineCode(first)}-${first.id.match(/\d{8}/)?.[0] || "20260618"}-合并（${validItems.length}条数据）`,
            feedbackIds: ids,
            status: "转工单",
            owner: currentUser.name === "管理员" ? "管理员" : currentUser.name,
            dept: getProductLineCode(first) === "CM" ? "筋膜枪产品线" : "八电极产品线",
            sla: "48h 00m",
            result: first.level3 || "待补充处理方案",
            closeReason: "-",
            exception: "否",
            requirement: "否",
            step: 1,
          });
        };
        const updateWorkOrderFromFeedback = (data) => {
          if (data?.processRoute !== "已转工单") return;
          addWorkOrderFromFeedback(data);
          const order = localWorkOrders.find((item) => getWorkOrderFeedbackIds(item).includes(data.id));
          if (order) {
            order.owner = data.handler || order.owner;
            order.summary = order.summary || createAiWorkOrderSummary([data]);
            order.result = data.level3 || order.result;
          }
        };
        localFeedbackData.forEach(updateWorkOrderFromFeedback);
        const unmergeFeedback = (id) => {
          const item = allFeedbackItems().find((data) => data.id === id);
          if (!item) return;
          item.mergeGroup = "";
          refreshFeedbackTable();
          closeDetailDrawer();
        };
        const getReturnProgress = (data) => {
          if (!data.returned || data.returned === "否") {
            return [
              ["售后状态", "未触发退换货"],
              ["PMS单号", "无"],
              ["当前节点", "无需售后处理"],
              ["更新时间", data.date],
            ];
          }
          return [
            ["售后状态", `${data.returned}处理中`],
            ["PMS单号", getExpressNo(data) || `AS-${data.id.replace(/[^0-9]/g, "").slice(-8)}`],
            ["当前节点", data.processState === "已处理" ? "已完成售后闭环" : "PMS售后模块处理中"],
            ["更新时间", data.date],
          ];
        };

        const needsManualReview = (data) => data?.processState === "待人工复核";
        const actionCell = (data, context = {}) => `
          <td>
            <span class="local-row-actions">
              <button type="button" data-local-action="detail" data-id="${data.id}">详情</button>
              ${context.canUnmerge ? `<button type="button" data-local-action="unmerge" data-id="${data.id}">移出合并</button>` : ""}
              ${needsManualReview(data) ? `<button type="button" class="review" data-local-action="review" data-id="${data.id}">人工复核</button>` : ""}
            </span>
          </td>
        `;

        const buildFilterText = (items) => items.map(({ data, confidence }, index) => [
          data.id,
          getDataSource(data),
          getModeLabel(data, confidence, index),
          data.brand,
          data.site,
          getDeviceType(data),
          data.model,
          data.internal,
          data.asin,
          data.raw,
          data.ai,
          data.level1,
          data.level2,
          data.level3,
          data.returned,
          data.exception,
          data.processRoute,
          data.processState,
          data.feedbackUser,
          data.handler,
          data.date,
        ].filter(Boolean).join(" ")).join(" ");

        const setRowFilterData = (row, data, confidence, index = 0, members = null) => {
          const items = members || [{ data, confidence }];
          row.dataset.localSearch = buildFilterText(items).toLowerCase();
          row.dataset.localSource = getDataSource(data) || "";
          row.dataset.localMode = getModeLabel(data, confidence, index);
          row.dataset.localBrand = data.brand || "";
          row.dataset.localSite = data.site || "";
          row.dataset.localProductType = getDeviceType(data) || "";
          row.dataset.localModel = data.model || "";
          row.dataset.localInternal = data.internal || "";
          row.dataset.localContent = `${data.raw || ""} ${data.ai || ""}`;
          row.dataset.localFeedbackUser = data.feedbackUser || "";
          row.dataset.localDate = data.date || "";
          row.dataset.localProcessState = data.processState || "待处理";
          row.dataset.localProcessRoute = data.processRoute || "待处理";
          row.dataset.localException = data.exception || "";
          row.dataset.localReturned = data.returned || "";
        };

        const renderRowCells = (row, data, confidence, childIndex = null, context = {}) => {
          const mode = data.createMode === "人工录入" ? "manual" : data.createMode === "AI自动创建" ? "ai" : getCreateMode(data, confidence, childIndex || 0);
          const idCell = childIndex == null
            ? `<span class="feedback-id-button">${data.id}</span>`
            : `<div class="local-child-title"><span class="local-child-branch">└</span><span><span class="feedback-id-button">${data.id}</span><span class="local-child-index">第 ${childIndex + 1} 条明细</span></span></div>`;
          const excel = getExcelRow(data);
          row.dataset.localBuilt = "true";
          row.dataset.localId = data.id;
          row.dataset.localConfidence = confidence.toFixed(2);
          setRowFilterData(row, data, confidence, childIndex || 0);
          row.innerHTML = `
            <td class="select-column"><input type="checkbox" /></td>
            <td class="id-cell">${idCell}</td>
            <td>${excel.region}</td>
            <td><span class="source-chip">${excel.dataSource}</span></td>
            <td>${excel.deviceType}</td>
            <td>${data.brand}</td>
            <td>${data.internal}</td>
            <td>${data.model}</td>
            <td>${excel.orderNo}</td>
            <td>${excel.expressNo}</td>
            <td class="truncate">${data.raw}</td>
            <td class="truncate">${data.ai}</td>
            <td>${excel.image}</td>
            <td>${excel.video}</td>
            <td>${data.date}</td>
            <td class="truncate">${excel.solution}</td>
            <td>${data.level1}</td>
            <td>${data.level2}</td>
            <td>${data.level3}</td>
            <td>${data.exception}</td>
            <td><span class="local-feedback-indent">${getModeBadge(mode, confidence)}</span></td>
            <td>${data.processRoute}</td>
            <td>${data.processState}</td>
            <td>${data.feedbackUser}</td>
            <td>${data.handler}</td>
            ${actionCell(data, context)}
          `;
        };

        const ensureFeedbackColumns = (table) => {
          const headerRow = table.querySelector("thead tr");
          if (!headerRow || headerRow.dataset.localColumnsReady === "true") return;
          headerRow.dataset.localColumnsReady = "true";
          headerRow.innerHTML = tableHeaders.map((label, index) => {
            if (index === 0) {
              return '<th class="select-column"><span class="select-all-cell"><input type="checkbox" /> 全选</span></th>';
            }
            return `<th>${label}</th>`;
          }).join("");
          headerRow.querySelector('.select-column input[type="checkbox"]')?.addEventListener("change", (event) => {
            table.querySelectorAll('tbody tr:not(.local-feedback-hidden) .select-column input[type="checkbox"]').forEach((box) => {
              box.checked = event.target.checked;
            });
            updateBatchSelectedCount();
          });
        };

        const buildSiteMulti = (bar) => {
          const siteLabel = Array.from(bar.querySelectorAll(".select-control")).find((node) => node.querySelector("span")?.textContent.includes("站点"));
          if (!siteLabel || siteLabel.dataset.localMultiReady === "true") return;
          siteLabel.dataset.localMultiReady = "true";
          const select = siteLabel.querySelector("select");
          const panel = document.createElement("div");
          panel.className = "local-site-multi-panel";
          panel.hidden = true;
          panel.innerHTML = `
            <div class="local-site-multi-list">
              ${siteOptions.map((site) => `<label><input type="checkbox" value="${site}" /> ${site}</label>`).join("")}
            </div>
            <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:10px;">
              <button type="button" class="secondary-button" data-local-site-close>关闭</button>
            </div>
          `;
          const wrap = document.createElement("div");
          wrap.className = "local-site-multi";
          const display = document.createElement("button");
          display.type = "button";
          display.className = "filter-trigger";
          display.innerHTML = `<span class="filter-label">全部站点</span><span class="filter-caret"></span>`;
          siteLabel.innerHTML = "";
          siteLabel.appendChild(display);
          siteLabel.appendChild(panel);
          siteLabel.appendChild(select);
          select.style.display = "none";
          const sync = () => {
            const values = Array.from(panel.querySelectorAll('input[type="checkbox"]')).filter((box) => box.checked).map((box) => box.value);
            const label = display.querySelector(".filter-label");
            if (label) label.textContent = values.length ? values.join(" / ") : "全部站点";
            select.value = values[0] || "";
            select.dataset.localMultiValues = JSON.stringify(values);
            applyFeedbackFilters();
          };
          display.addEventListener("click", () => {
            panel.hidden = !panel.hidden;
          });
          panel.addEventListener("click", (event) => {
            const target = event.target;
            if (target?.matches('input[type="checkbox"]')) sync();
          });
          panel.querySelector("[data-local-site-close]")?.addEventListener("click", () => { panel.hidden = true; });
          sync();
        };

        const optionList = (items, placeholder = "全部") => `<option value="">${placeholder}</option>${items.map((item) => `<option value="${item}">${item}</option>`).join("")}`;

        const buildFixedFilters = (toolbar) => {
          if (document.querySelector(".local-fixed-filter-panel")) return;
          const panel = document.createElement("div");
          panel.className = "local-fixed-filter-panel";
          panel.hidden = true;
          panel.innerHTML = `
            <label>数据来源<select data-filter-key="source">${optionList(["海外电商-退货反馈", "国内电商-退货反馈", "海外电商-商品评论", "国内电商-商品评论", "站内信", "客服沟通", "APP反馈"])}</select></label>
            <label>创建方式<select data-filter-key="mode">${optionList(["AI自动创建", "人工录入"])}</select></label>
            <label>品牌<input data-filter-key="brand" placeholder="输入品牌" /></label>
            <label>站点<select data-filter-key="site">${optionList(siteOptions)}</select></label>
            <label>设备类型<input data-filter-key="productType" placeholder="输入设备类型" /></label>
            <label>销售型号<input data-filter-key="model" placeholder="输入销售型号" /></label>
            <label>内部型号/料号<input data-filter-key="internal" placeholder="输入内部型号/料号" /></label>
            <label>反馈人<input data-filter-key="feedbackUser" placeholder="输入反馈人" /></label>
            <label>反馈开始时间<input type="date" data-filter-key="dateFrom" /></label>
            <label>反馈结束时间<input type="date" data-filter-key="dateTo" /></label>
            <label>状态<select data-filter-key="processState">${optionList(processStateOptions)}</select></label>
            <label>异常等级<select data-filter-key="exception">${optionList(["P0", "P1", "P2", "P3", "待确认", "否"])}</select></label>
            <label>退换货<select data-filter-key="returned">${optionList(returnOptions)}</select></label>
            <label>处理去向<select data-filter-key="processRoute">${optionList(processRouteOptions)}</select></label>
            <div class="local-filter-actions"><button type="button" class="secondary-button" data-local-filter-reset>重置筛选</button></div>
          `;
          toolbar.insertAdjacentElement("afterend", panel);
          panel.addEventListener("input", applyFeedbackFilters);
          panel.addEventListener("change", applyFeedbackFilters);
          panel.querySelector("[data-local-filter-reset]")?.addEventListener("click", () => {
            panel.querySelectorAll("[data-filter-key]").forEach((field) => { field.value = ""; });
            document.querySelectorAll(".local-feedback-tab").forEach((button) => button.classList.toggle("active", button.dataset.tabKey === "all"));
            applyFeedbackFilters();
          });
        };

        const toggleFixedFilters = () => {
          const panel = document.querySelector(".local-fixed-filter-panel");
          const button = document.querySelector("[data-local-filter-toggle]");
          if (!panel || !button) return;
          panel.hidden = !panel.hidden;
          button.classList.toggle("active", !panel.hidden);
          button.textContent = panel.hidden ? "筛选" : "收起筛选";
        };

        const buildFeedbackTabs = () => {
          const tableWrap = document.querySelector(".feedback-table")?.closest(".table-scroll");
          if (!tableWrap || document.querySelector(".local-feedback-tabs")) return;
          const tabs = document.createElement("div");
          tabs.className = "local-feedback-tabs";
          tabs.innerHTML = feedbackTabOptions.map((tab, index) => `<button type="button" class="local-feedback-tab ${index === 0 ? "active" : ""}" data-tab-key="${tab.key}">${tab.label}</button>`).join("");
          tableWrap.insertAdjacentElement("beforebegin", tabs);
          tabs.addEventListener("click", (event) => {
            const button = event.target.closest("[data-tab-key]");
            if (!button) return;
            tabs.querySelectorAll(".local-feedback-tab").forEach((node) => node.classList.remove("active"));
            button.classList.add("active");
            applyFeedbackFilters();
          });
        };

        const enhanceToolbar = () => {
          const toolbar = document.querySelector(".split-page > section.content-main > .toolbar");
          if (!toolbar || toolbar.dataset.localToolbarReady === "true") return;
          toolbar.dataset.localToolbarReady = "true";
          const search = toolbar.querySelector("input");
          if (search) {
            const box = search.closest(".search-box");
            box?.remove();
          }
          buildFixedFilters(toolbar);
          buildFeedbackTabs();

              <td>${excel.deviceType}</td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td class="truncate"></td>
              <td class="truncate"></td>
              <td></td>
              <td></td>
              <td></td>
              <td class="truncate"></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td>${groupRoute}</td>
              <td></td>
              <td></td>
              <td>${groupHandler}</td>
              ${actionCell(data)}
            `;
            tbody.appendChild(lead);
            group.members.forEach((member, memberIndex) => {
              const child = document.createElement("tr");
              child.dataset.localBuilt = "true";
              child.dataset.localGroupChild = "true";
              child.className = "local-feedback-child local-feedback-hidden";
              renderRowCells(child, member.data, member.confidence, memberIndex, { canUnmerge: true });
              tbody.appendChild(child);
            });
            const toggle = lead.querySelector(".local-merge-toggle");
            toggle?.addEventListener("click", () => {
              const isOpen = toggle.getAttribute("aria-expanded") === "true";
              toggle.setAttribute("aria-expanded", String(!isOpen));
              toggle.textContent = isOpen ? "+" : "−";
              let open = !isOpen;
              let sibling = lead.nextElementSibling;
              while (sibling && sibling.classList.contains("local-feedback-child")) {
                sibling.classList.toggle("local-feedback-hidden", !open);
                sibling = sibling.nextElementSibling;
              }
              applyFeedbackFilters();
            });
          });
          applyFeedbackFilters();
          updateBatchSelectedCount();
        };

        const bindActions = async () => {
          const toolbar = document.querySelector(".split-page > section.content-main > .toolbar");
          if (!toolbar) return false;
          if (toolbar.dataset.localFeedbackReady === "true") return true;
          toolbar.dataset.localFeedbackReady = "true";
          addStyles();
          enhanceToolbar();
          buildSiteMulti(toolbar);
          const addBtn = toolbar.querySelector("button.primary-button");
          addBtn?.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            setTimeout(openFeedbackModal, 0);
          });
          const templateBtn = Array.from(toolbar.querySelectorAll("button")).find((button) => button.textContent.includes("批量导入"));
          templateBtn?.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            setTimeout(openBatchImportModal, 0);
          });
          const syncBtn = Array.from(toolbar.querySelectorAll("button")).find((button) => button.textContent.includes("同步"));
          syncBtn?.addEventListener("click", applyFeedbackFilters);
          document.querySelectorAll(".batch-action-buttons button").forEach((button) => {
            if (button.dataset.localBatchReady === "true") return;
            button.dataset.localBatchReady = "true";
            button.disabled = false;
            button.removeAttribute("disabled");
            button.setAttribute("aria-disabled", "false");
            button.addEventListener("click", (event) => {
              event.preventDefault();
              event.stopPropagation();
              const text = button.textContent.trim();
              const route = text.includes("工单") ? "已转工单"
                : text.includes("异常") ? "已转异常"
                : text.includes("需求") ? "已转需求"
                : text.includes("Q&A") ? "已转Q&A"
                : "";
              if (route) applyBatchRoute(route);
            });
          });
          Array.from(document.querySelectorAll("button")).filter((button) => button.textContent.includes("AI辅助")).forEach((button) => {
            if (button.dataset.localAiAssistReady === "true") return;
            button.dataset.localAiAssistReady = "true";
            button.disabled = false;
            button.removeAttribute("disabled");
            button.setAttribute("aria-disabled", "false");
            button.addEventListener("click", (event) => {
              event.preventDefault();
              event.stopPropagation();
              openAiAssistModal();
            });
          });
          let feedbackObserverScheduled = false;
          const observer = new MutationObserver(() => {
            if (feedbackObserverScheduled) return;
            feedbackObserverScheduled = true;
            requestAnimationFrame(() => {
              feedbackObserverScheduled = false;
            try {
              rebuildFeedbackTable();
              enhanceToolbar();
              enhanceWorkOrderPage();
              enhanceEmergencyPage();
              enhanceCompetitionPage();
              enhanceReportPage();
              enhanceQaPage();
              enhanceSettingsPage();
              setupUserSwitcher();
              syncNavLabels();
              const nativeDrawer = document.querySelector("aside.drawer");
              if (nativeDrawer && !document.querySelector(".local-detail-drawer") && !document.querySelector(".local-detail-page")) {
                const firstVisible = Array.from(document.querySelectorAll("tbody tr[data-local-id]")).find((row) => !row.classList.contains("local-feedback-hidden"));
                nativeDrawer.remove();
                document.querySelector(".split-page")?.classList.remove("with-drawer");
                if (firstVisible) openFeedbackDetail(findFeedbackById(firstVisible.dataset.localId));
              }
            } catch (error) {
              console.error("local feedback observer failed", error);
              window.__localFeedbackError = error?.message || String(error);
            }
            });
          });
          observer.observe(document.body, { childList: true, subtree: true });
          rebuildFeedbackTable();
          enhanceWorkOrderPage();
          enhanceEmergencyPage();
          enhanceCompetitionPage();
          enhanceReportPage();
          enhanceQaPage();
          enhanceSettingsPage();
          setupUserSwitcher();
          syncNavLabels();
          document.addEventListener("click", (event) => {
            if (!event.target.closest(".local-site-multi")) {
              document.querySelectorAll(".local-site-multi-panel").forEach((panel) => { panel.hidden = true; });
            }
            if (!event.target.closest(".local-modal")) closeModal();
          });
          window.__localFeedbackEnhancerReady = true;
          return true;
        };

        const tryBind = () => {
          try {
            enhanceWorkOrderPage();
            enhanceEmergencyPage();
            enhanceCompetitionPage();
            enhanceReportPage();
            enhanceQaPage();
            enhanceSettingsPage();
            syncNavLabels();
            return bindActions();
          } catch (error) {
            console.error("local feedback enhancer failed", error);
            window.__localFeedbackError = error?.message || String(error);
            return false;
          }
        };
        let rootObserverScheduled = false;
        const observer = new MutationObserver(() => {
          if (rootObserverScheduled) return;
          rootObserverScheduled = true;
          requestAnimationFrame(() => {
            rootObserverScheduled = false;
            tryBind();
          });
        });

        const start = () => {
          tryBind();
          observer.observe(document.body, { childList: true, subtree: true });
        };

        if (domReady()) start();
        else document.addEventListener("DOMContentLoaded", start, { once: true });
      })();
    </script>
  </body>
</html>
