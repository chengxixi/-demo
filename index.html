<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prototype</title>
    <script type="module" crossorigin src="./assets/index-SXHQTfNW.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-OuHj09xx.css">
    <style>
      .local-model-search-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 240px;
      }

      .local-model-search-field label {
        color: #253858;
        font-size: 13px;
        font-weight: 700;
      }

      .local-model-search-field input {
        height: 40px;
        border: 1px solid #c8d5e8;
        border-radius: 8px;
        background: #fff;
        color: #17233c;
        font: inherit;
        padding: 0 12px;
        outline: none;
      }

      .local-model-search-field input:focus {
        border-color: #1f73e8;
        box-shadow: 0 0 0 3px rgba(31, 115, 232, 0.14);
      }

      .formula-popover {
        position: absolute;
        top: 38px;
        right: 18px;
        z-index: 20;
        display: none;
        min-width: 150px;
        border: 1px solid #b8c7dd;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 10px 28px rgba(20, 35, 64, 0.16);
        color: #17233c;
        font-size: 13px;
        font-weight: 700;
        padding: 10px 12px;
      }

      .formula-popover.visible {
        display: block;
      }

      .has-formula-help {
        position: relative;
      }

      .local-model-search-field {
        position: relative;
      }

      .local-model-search-field input:not(:placeholder-shown) {
        padding-right: 34px;
      }

      .local-model-search-field button {
        position: absolute;
        right: 8px;
        bottom: 8px;
        width: 24px;
        height: 24px;
        display: none;
        place-items: center;
        border: 0;
        border-radius: 50%;
        background: #eef2f7;
        color: #475467;
        font-size: 16px;
        line-height: 1;
      }

      .local-model-search-field.has-value button {
        display: grid;
      }

      .model-rank-table .local-internal-cell {
        color: #475467;
        font-weight: 600;
        line-height: 1.35;
        white-space: normal;
      }

      .model-rank-table .local-internal-cell span {
        display: block;
        color: #98a2b3;
        font-size: 11px;
        font-weight: 500;
      }

      .model-rank-table .local-no-result-row td {
        height: 76px;
        color: #667085;
        text-align: center;
      }

      .local-hidden {
        display: none;
      }

      .local-site-multi {
        position: relative;
      }

      .local-site-multi-panel {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        z-index: 40;
        width: 260px;
        padding: 10px;
        border: 1px solid #c8d5e8;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 12px 30px rgba(20, 35, 64, 0.16);
      }

      .local-site-multi-panel[hidden] {
        display: none;
      }

      .local-site-multi-list {
        display: grid;
        gap: 6px;
      }

      .local-site-multi-list label {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #344054;
        font-size: 13px;
      }

      .local-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        min-height: 22px;
        padding: 0 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }

      .local-badge.ai {
        color: #1f73e8;
        background: #eaf2ff;
      }

      .local-badge.manual {
        color: #b54708;
        background: #fff3e0;
      }

      .local-badge.review {
        color: #b42318;
        background: #fee4e2;
      }

      .local-badge.low-confidence {
        color: #7a4c00;
        background: #fff8cc;
      }

      .local-merge-parent td {
        background: #f2f7ff;
        border-top: 1px solid #d7e7ff;
        border-bottom: 1px solid #d7e7ff;
        font-weight: 700;
      }

      .local-merge-toggle {
        width: 24px;
        height: 24px;
        margin-right: 8px;
        border: 1px solid #d7deea;
        border-radius: 6px;
        background: #fff;
        color: #1f73e8;
        font-weight: 800;
      }

      .local-merge-title {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 8px;
        align-items: start;
      }

      .local-merge-topic {
        display: block;
        color: #101828;
        font-size: 14px;
        font-weight: 800;
        line-height: 1.25;
      }

      .local-merge-meta {
        display: block;
        margin-top: 3px;
        color: #667085;
        font-size: 12px;
        font-weight: 600;
        line-height: 1.35;
      }

      .local-id-chip {
        display: inline-flex;
        align-items: center;
        max-width: 118px;
        min-height: 20px;
        margin-top: 5px;
        padding: 0 7px;
        border-radius: 999px;
        background: #eef2f7;
        color: #475467;
        font-size: 11px;
        font-weight: 700;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .local-child-title {
        display: grid;
        grid-template-columns: 18px minmax(0, 1fr);
        gap: 6px;
        align-items: start;
        padding-left: 18px;
      }

      .local-child-branch {
        color: #667085;
        font-weight: 800;
      }

      .local-child-index {
        display: block;
        color: #667085;
        font-size: 12px;
        font-weight: 600;
      }

      .local-review-filter {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 34px;
        padding: 0 10px;
        margin-left: 8px;
        border: 1px solid #d7deea;
        border-radius: 6px;
        background: #fee4e2;
        color: #b42318;
        font-size: 13px;
        font-weight: 700;
      }

      .local-review-filter .local-review-count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 20px;
        height: 20px;
        padding: 0 6px;
        border-radius: 999px;
        background: #fff;
        color: #b42318;
        font-size: 12px;
        font-weight: 800;
      }

      .local-review-filter.active {
        border-color: #e5484d;
        background: #fee4e2;
        color: #b42318;
      }

      .local-modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 90;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(16, 24, 40, 0.46);
      }

      .local-modal {
        width: min(920px, 100%);
        max-height: min(92vh, 920px);
        overflow: auto;
        padding: 18px;
        border: 1px solid #d7deea;
        border-radius: 10px;
        background: #fff;
        box-shadow: 0 20px 60px rgba(16, 24, 40, 0.24);
      }

      .local-modal-head {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .local-modal-head h2 {
        margin: 4px 0 0;
        font-size: 20px;
      }

      .local-modal-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .local-modal-grid .wide {
        grid-column: 1 / -1;
      }

      .local-modal-grid label {
        display: grid;
        gap: 6px;
        color: #344054;
        font-size: 13px;
        font-weight: 700;
      }

      .local-modal-grid input,
      .local-modal-grid select,
      .local-modal-grid textarea {
        width: 100%;
        min-height: 38px;
        padding: 8px 10px;
        border: 1px solid #d7deea;
        border-radius: 6px;
        background: #fff;
        color: #1d2939;
        font: inherit;
      }

      .local-modal-grid textarea {
        min-height: 92px;
        resize: vertical;
      }

      .local-modal-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 14px;
      }

      .local-template-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 0 0 14px;
      }

      .local-template-pill {
        min-height: 30px;
        padding: 0 10px;
        border: 1px solid #d7deea;
        border-radius: 999px;
        background: #fff;
        color: #344054;
        font-size: 12px;
        font-weight: 700;
      }

      .local-template-pill.active {
        border-color: #1f73e8;
        background: #eff6ff;
        color: #1f73e8;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const sortModelRankTable = () => {
          const tbody = document.querySelector(".model-rank-table tbody");
          if (!tbody) return false;

          const rows = Array.from(tbody.querySelectorAll("tr"));
          rows
            .sort((left, right) => {
              const leftValue = Number((left.children[3]?.textContent || "").replace(/,/g, "")) || 0;
              const rightValue = Number((right.children[3]?.textContent || "").replace(/,/g, "")) || 0;
              return rightValue - leftValue;
            })
            .forEach((row, index) => {
              const rankCell = row.children[0];
              if (rankCell) rankCell.textContent = String(index + 1);
              tbody.appendChild(row);
            });

          return true;
        };

        if (sortModelRankTable()) return;

        const observer = new MutationObserver(() => {
          if (!sortModelRankTable()) return;
          observer.disconnect();
        });

        observer.observe(document.body, { childList: true, subtree: true });
      })();

      (() => {
        const byText = (selector, text) =>
          Array.from(document.querySelectorAll(selector)).find((node) => node.textContent.trim() === text);

        const ensureInternalSearch = () => {
          const filterBar = document.querySelector(".filter-bar");
          if (!filterBar || filterBar.querySelector("[data-local-model-search]")) return Boolean(filterBar);

          const field = document.createElement("div");
          field.className = "local-model-search-field";
          field.dataset.localModelSearch = "true";
          field.innerHTML = '<label for="internal-model-search">内部型号/料号</label><input id="internal-model-search" type="search" placeholder="搜索内部型号或料号" autocomplete="off" />';
          filterBar.appendChild(field);
          return true;
        };

        const formulaTexts = new Map([
          ["退货率", "计算公式：退货量/销量"],
          ["反馈率", "计算公式：反馈量/销量"],
          ["闭环率", "计算公式：反馈单据关闭数量/总反馈量（关闭指关闭、转需求、转异常或直接关闭）"],
          ["响应达成率", "计算公式：P0/P1/P2/P3异常在规定时间内响应的达成情况"],
          ["异常占比", "计算公式：产生的异常数量/反馈总数"],
          ["差评率", "计算公式：差评数量/评论总数"],
          ["产品型号表现 TOP10", "统计口径：按当前筛选条件下的反馈量从大到小排名"],
          ["退货率 vs 反馈率", "计算公式：退货率=退货量/销量；反馈率=反馈量/销量"],
          ["反馈趋势", "统计口径：按时间周期汇总反馈量、退货率和差评率"],
          ["问题分类分布", "统计口径：分类反馈量/总反馈量"],
          ["问题层级分布", "统计口径：对应层级反馈量/总反馈量"],
        ]);

        const attachFormulaPopover = (target, text) => {
          if (!target || target.dataset.formulaReady === "true") return Boolean(target);

          target.dataset.formulaReady = "true";
          target.classList.add("has-formula-help");
          const popover = document.createElement("div");
          popover.className = "formula-popover";
          popover.textContent = text;
          target.appendChild(popover);

          return true;
        };

        const ensureFormulaPopovers = () => {
          const results = [];
          document.querySelectorAll(".metric-card").forEach((card) => {
            const label = card.querySelector(".metric-label")?.textContent.trim();
            const text = formulaTexts.get(label);
            if (text) results.push(attachFormulaPopover(card, text));
          });

          formulaTexts.forEach((text, label) => {
            if (["退货率", "反馈率", "闭环率", "响应达成率", "异常占比", "差评率"].includes(label)) return;
            const title = Array.from(document.querySelectorAll(".panel-title, h2, h3")).find((node) =>
              node.textContent.includes(label)
            );
            const panel = title?.closest(".panel, section, article");
            if (panel) results.push(attachFormulaPopover(panel, text));
          });

          return results.length > 0;
        };

        const metricSets = {
          mom: [
            ["4.38%", "-0.72%"],
            ["12.67%", "-1.34%"],
            ["87.45%", "+3.21%"],
            ["92.16%", "+4.57%"],
            ["6.72%", "+0.89%"],
            ["3.25%", "-0.31%"],
          ],
          yoy: [
            ["4.91%", "+0.48%"],
            ["13.24%", "+2.06%"],
            ["86.03%", "-1.18%"],
            ["89.74%", "+1.92%"],
            ["7.18%", "+1.16%"],
            ["3.62%", "+0.27%"],
          ],
        };

        const applyMetricSet = (type) => {
          const cards = Array.from(document.querySelectorAll(".metric-card"));
          metricSets[type].forEach(([value, delta], index) => {
            const card = cards[index];
            if (!card) return;
            const valueNode = Array.from(card.querySelectorAll("*")).find((node) => /^\d+(\.\d+)?%$/.test(node.textContent.trim()));
            const deltaNode = Array.from(card.querySelectorAll("*")).find((node) => /^[+-]\d+(\.\d+)?%$/.test(node.textContent.trim()));
            if (valueNode) valueNode.textContent = value;
            if (deltaNode) {
              deltaNode.textContent = delta;
              deltaNode.classList.toggle("bad-text", delta.startsWith("+") && index === 4);
              deltaNode.classList.toggle("good-text", !delta.startsWith("+") || index !== 4);
            }
          });
        };

        const wireCompareButtons = () => {
          const yoyButton = byText("button", "同比");
          const momButton = byText("button", "环比");
          if (!yoyButton || yoyButton.dataset.compareReady === "true") return Boolean(yoyButton);

          yoyButton.dataset.compareReady = "true";
          yoyButton.addEventListener("click", () => setTimeout(() => applyMetricSet("yoy"), 0));
          if (momButton) momButton.addEventListener("click", () => setTimeout(() => applyMetricSet("mom"), 0));
          return true;
        };

        const wireFormulaClick = () => {
          if (document.body.dataset.formulaClickReady === "true") return true;
          document.body.dataset.formulaClickReady = "true";

          document.addEventListener("click", (event) => {
            const source = event.target.nodeType === 1 ? event.target : event.target.parentElement;
            const target = source?.closest(".has-formula-help");
            const visiblePopovers = document.querySelectorAll(".formula-popover.visible");

            if (!target) {
              visiblePopovers.forEach((node) => node.classList.remove("visible"));
              return;
            }

            const rect = target.getBoundingClientRect();
            const clickedHelpArea = event.clientX > rect.right - 64 && event.clientY < rect.top + 56;
            const clickedMetricCard = target.classList.contains("metric-card");
            const clickedLabel = source?.closest(".metric-label");
            const clickedTitle = source?.closest(".panel-title, h2, h3");
            if (!clickedHelpArea && !clickedMetricCard && !clickedLabel && !clickedTitle) return;

            const popover = target.querySelector(".formula-popover");
            if (!popover) return;
            visiblePopovers.forEach((node) => {
              if (node !== popover) node.classList.remove("visible");
            });
            popover.classList.toggle("visible");
          }, true);

          return true;
        };

        const enhance = () => {
          const ready = [
            ensureInternalSearch(),
            ensureFormulaPopovers(),
            wireFormulaClick(),
            wireCompareButtons(),
          ];
          return ready.every(Boolean);
        };

        if (enhance()) return;

        const observer = new MutationObserver(() => {
          enhance();
        });

        observer.observe(document.body, { childList: true, subtree: true });
      })();

      (() => {
        if (window.__localInternalSearchReady) return;
        window.__localInternalSearchReady = true;

        const extraRows = [
          ["YB-CS10 入门体脂秤", "2,116", "286", "4.36%", "3.04%", "4.4分"],
          ["YB-BF511 八电极体脂秤", "1,984", "251", "4.09%", "2.92%", "4.5分"],
          ["YB-MS30 深层筋膜枪", "1,736", "218", "3.87%", "2.75%", "4.3分"],
          ["YB-S30 人体秤", "1,514", "176", "3.62%", "2.41%", "4.6分"],
          ["YB-F2 智能体脂秤 F2", "1,206", "139", "3.44%", "2.18%", "4.5分"],
        ];

        const internalModelMap = new Map([
          ["YB-S100 八电极体脂秤", ["YL-S100-8", "PN-S100-8E"]],
          ["YB-201 人体成分秤", ["YL-201-BIA", "PN-201-B"]],
          ["YB-301 体脂秤 Pro", ["YL-301-PRO", "PN-301-P"]],
          ["YB-M3 筋膜枪 M3 Pro", ["YL-M3-PRO", "PN-M3-MASS"]],
          ["YB-F1 智能体脂秤 F1", ["YL-F1-SCALE", "PN-F1-BIA"]],
          ["YB-CS10 入门体脂秤", ["YL-CS10-4", "PN-CS10-4E"]],
          ["YB-BF511 八电极体脂秤", ["YL-BF511-8", "PN-BF511"]],
          ["YB-MS30 深层筋膜枪", ["YL-MS30", "PN-MS30-MASS"]],
          ["YB-S30 人体秤", ["YL-S30", "PN-S30-WT"]],
          ["YB-F2 智能体脂秤 F2", ["YL-F2-SCALE", "PN-F2-BIA"]],
        ]);

        const normalize = (value) => String(value || "").trim().toLowerCase();

        const getModelName = (row) => row.querySelector(".model-name")?.textContent.trim() || row.children[1]?.textContent.trim() || "";

        const ensureClearButton = (input) => {
          const field = input.closest(".local-model-search-field");
          if (!field || field.querySelector("[data-local-clear-model-search]")) return;

          const button = document.createElement("button");
          button.type = "button";
          button.dataset.localClearModelSearch = "true";
          button.setAttribute("aria-label", "清空内部型号/料号搜索");
          button.textContent = "×";
          button.addEventListener("click", () => {
            input.value = "";
            input.dispatchEvent(new Event("input", { bubbles: true }));
            input.focus();
          });
          field.appendChild(button);
        };

        const ensureTop10Rows = (tbody) => {
          let changed = false;
          const currentModels = new Set(Array.from(tbody.querySelectorAll("tr")).map(getModelName));
          extraRows.forEach((cells) => {
            if (currentModels.has(cells[0])) return;

            const row = document.createElement("tr");
            row.dataset.localAddedModelRow = "true";
            row.innerHTML = `<td></td>${cells.map((cell, index) => `<td${index === 0 ? ' class="model-name"' : ""}>${cell}</td>`).join("")}`;
            tbody.appendChild(row);
            changed = true;
          });
          return changed;
        };

        const ensureInternalColumn = (table) => {
          const headRow = table.querySelector("thead tr");
          if (!headRow || headRow.dataset.localInternalReady === "true") return false;

          headRow.dataset.localInternalReady = "true";
          const header = document.createElement("th");
          header.textContent = "内部型号/料号";
          headRow.insertBefore(header, headRow.children[2] || null);
          return true;
        };

        const ensureInternalCells = (tbody) => {
          let changed = false;
          Array.from(tbody.querySelectorAll("tr:not(.local-no-result-row)")).forEach((row) => {
            if (row.dataset.localInternalCellReady === "true") return;

            const modelName = getModelName(row);
            const [internal, partNo] = internalModelMap.get(modelName) || ["待补充", "待补充"];
            const cell = document.createElement("td");
            cell.className = "local-internal-cell";
            cell.innerHTML = `${internal}<span>${partNo}</span>`;
            row.dataset.localSearchText = normalize(`${modelName} ${internal} ${partNo}`);
            row.dataset.localInternalCellReady = "true";
            row.insertBefore(cell, row.children[2] || null);
            changed = true;
          });
          return changed;
        };

        const sortVisibleRows = (table, tbody) => {
          if (table.dataset.localInternalSorted === "true") return;
          const rows = Array.from(tbody.querySelectorAll("tr:not(.local-no-result-row)"));
          rows
            .sort((left, right) => {
              const leftValue = Number((left.children[4]?.textContent || "").replace(/,/g, "")) || 0;
              const rightValue = Number((right.children[4]?.textContent || "").replace(/,/g, "")) || 0;
              return rightValue - leftValue;
            })
            .forEach((row) => tbody.appendChild(row));
          table.dataset.localInternalSorted = "true";
        };

        const applyInternalSearch = () => {
          const input = document.querySelector("#internal-model-search");
          const tbody = document.querySelector(".model-rank-table tbody");
          if (!input || !tbody) return false;

          const field = input.closest(".local-model-search-field");
          const query = normalize(input.value);
          let visibleRank = 0;
          tbody.querySelector(".local-no-result-row")?.remove();

          Array.from(tbody.querySelectorAll("tr:not(.local-no-result-row)")).forEach((row) => {
            const matched = !query || row.dataset.localSearchText.includes(query);
            row.classList.toggle("local-hidden", !matched);
            if (!matched) return;

            visibleRank += 1;
            const rankCell = row.children[0];
            if (rankCell) rankCell.textContent = String(visibleRank);
          });

          field?.classList.toggle("has-value", Boolean(query));
          if (visibleRank > 0) return true;

          const noResult = document.createElement("tr");
          noResult.className = "local-no-result-row";
          noResult.innerHTML = '<td colspan="8">未找到匹配的内部型号或料号</td>';
          tbody.appendChild(noResult);
          return true;
        };

        const wireInternalModelSearch = () => {
          const table = document.querySelector(".model-rank-table");
          const tbody = table?.querySelector("tbody");
          const input = document.querySelector("#internal-model-search");
          if (!table || !tbody || !input) return false;

          ensureClearButton(input);
          const changed = [
            ensureTop10Rows(tbody),
            ensureInternalColumn(table),
            ensureInternalCells(tbody),
          ].some(Boolean);
          if (changed) table.dataset.localInternalSorted = "false";
          sortVisibleRows(table, tbody);

          if (input.dataset.localSearchReady !== "true") {
            input.dataset.localSearchReady = "true";
            input.placeholder = "搜索 YL-CS20A-8 或 PN-BF511";
            input.addEventListener("input", applyInternalSearch);
          }

          applyInternalSearch();

          `;

        };

        const domReady = () => document.readyState !== "loading";
        const waitFor = (selector, timeoutMs = 8000) => new Promise((resolve) => {
          const found = document.querySelector(selector);
          if (found) return resolve(found);
          const start = Date.now();
          const timer = setInterval(() => {
            const node = document.querySelector(selector);
            if (node) {
              clearInterval(timer);
              resolve(node);
            } else if (Date.now() - start > timeoutMs) {
              clearInterval(timer);
              resolve(null);
            }
          }, 120);
        });

        const getFeedbackRows = () => Array.from(document.querySelectorAll(".feedback-table tbody tr")).filter((row) => !row.dataset.localBuilt);

        const normalize = (value) => String(value || "").trim().toLowerCase();

        const getRowData = (row) => ({
          id: row.querySelector(".feedback-id-cell")?.textContent.trim() || row.children[1]?.textContent.trim() || "",
          source: row.children[2]?.textContent.trim() || "",
          brand: row.children[3]?.textContent.trim() || "",
          site: row.children[4]?.textContent.trim() || "",
          productType: row.children[5]?.textContent.trim() || "",
          model: row.children[6]?.textContent.trim() || "",
          internal: row.children[7]?.textContent.trim() || "",
          asin: row.children[8]?.textContent.trim() || "",
          raw: row.children[9]?.textContent.trim() || row.querySelector(".truncate")?.textContent.trim() || "",
          ai: row.children[10]?.textContent.trim() || "",
          level1: row.children[11]?.textContent.trim() || "",
          level2: row.children[12]?.textContent.trim() || "",
          level3: row.children[13]?.textContent.trim() || "",
          sentiment: row.children[14]?.textContent.trim() || "",
          returned: row.children[15]?.textContent.trim() || "",
          exception: row.children[16]?.textContent.trim() || "",
          processRoute: row.children[17]?.textContent.trim() || "待处理",
          processState: row.children[17]?.textContent.includes("已") ? "已处理" : "待处理",
          feedbackUser: row.children[18]?.textContent.trim() || "",
          handler: row.children[19]?.textContent.trim() || "",
          date: row.children[20]?.textContent.trim() || "",
        });

        const scoreConfidence = (row) => {
          const source = row.children[2]?.textContent.trim();
          const raw = row.querySelector(".truncate")?.textContent.trim() || "";
          const model = row.children[6]?.textContent.trim() || "";
          let confidence = source === "APP反馈" ? 0.54 : 0.74;
          if (/crash|闪退|无法|不准|broken|裂/.test(raw.toLowerCase())) confidence -= 0.08;
          if (/CS20A|CS30B|MG20/.test(model)) confidence += 0.04;
          if (source === "商品评论" && /not|stopped|very different|cracked/i.test(raw)) confidence -= 0.03;
          return Math.max(0.34, Math.min(0.96, confidence));
        };

        const getDemoConfidence = (data) => data.processState === "待人工复核" ? 0.54 : 0.78;

        const rowSimilarity = (a, b) => {
          const sameModel = a.model === b.model || a.internal === b.internal;
          const sameBrand = a.brand === b.brand;
          const sameSource = a.source === b.source;
          const rawA = normalize(a.raw);
          const rawB = normalize(b.raw);
          const shared = [a.model, a.internal, a.brand].filter(Boolean).some((token) => rawA.includes(normalize(token)) && rawB.includes(normalize(token)));
          return (sameModel ? 0.5 : 0) + (sameBrand ? 0.15 : 0) + (sameSource ? 0.15 : 0) + (shared ? 0.2 : 0);
        };

        const buildMergedFeedback = (rows) => {
          const seedRows = localFeedbackData.length ? localFeedbackData : rows.map(getRowData);
          const items = seedRows.map((data) => ({ data: normalizeExceptionRoute(data), confidence: getDemoConfidence(data) }));
          const groups = [];
          items.forEach((item) => {
            if (isExceptionPoolItem(item.data)) {
              groups.push({ mergeGroup: "", lead: item, members: [item], expanded: false });
              return;
            }
            let bucket = item.data.mergeGroup
              ? groups.find((group) => group.mergeGroup === item.data.mergeGroup && getProductLineCode(group.lead.data) === getProductLineCode(item.data))
              : null;
            if (!bucket) {
              bucket = { mergeGroup: item.data.mergeGroup || "", lead: item, members: [item], expanded: false };
              groups.push(bucket);
            } else {
              bucket.members.push(item);
            }
          });
          return groups;
        };

        const getCreateMode = (data, confidence, index = 0) => {
          if (data.source === "站内信" || data.source === "客服沟通") return "manual";
          if (confidence < 0.6 && index % 2 === 1) return "manual";
          return "ai";
        };

        const getMergeTitle = (group) => {
          const data = group.lead.data;
          const issue = data.level3 || data.level2 || data.raw || "相似反馈";
          return `${data.model || data.internal || data.productType} ${issue}合并反馈`;
        };

        const getModeBadge = (mode, confidence) => {
          if (mode === "manual") return '<span class="local-badge manual">人工录入</span>';
          return '<span class="local-badge ai">AI自动创建</span>';
        };

        const getModeLabel = (data, confidence, index = 0) => {
          if (data.createMode === "人工录入") return "人工录入";
          if (data.createMode === "AI自动创建") return "AI自动创建";
          const mode = getCreateMode(data, confidence, index);
          if (mode === "manual") return "人工录入";
          return "AI自动创建";
        };

        const getRegion = (data) => data.site === "Amazon.com (US)" ? "海外" : "国内";
        const getDataSource = (data) => {
          if (data.source === "退货原因") return getRegion(data) === "海外" ? "海外电商-退货反馈" : "国内电商-退货反馈";
          if (data.source === "商品评论") return getRegion(data) === "海外" ? "海外电商-商品评论" : "国内电商-商品评论";
          return data.source;
        };
        const getDeviceType = (data) => data.productType === "体脂秤" ? "八电极" : data.productType;
        const getProductLineCode = (data) => {
          const deviceType = getDeviceType(data);
          if (deviceType === "筋膜枪") return "CM";
          if (deviceType === "八电极" || deviceType === "体脂秤") return "CS";
          return "CS";
        };
        const isExceptionPoolItem = (data) => ["P0", "P1"].includes(String(data.exception || "").toUpperCase());
        const normalizeExceptionRoute = (data) => {
          if (!isExceptionPoolItem(data)) return data;
          data.mergeGroup = "";
          data.processRoute = "已转异常";
          data.processState = "已处理";
          data.handler = "系统";
          return data;
        };
        const getMergeDisplayId = (group) => {
          const data = group.lead.data;
          const date = (data.id.match(/\d{8}/)?.[0] || (data.date || "").replace(/-/g, "") || "20260618");
          return `${getProductLineCode(data)}-${date}-合并（${group.members.length}条数据）`;
        };
        const getGroupField = (group, key, mixedLabel) => {
          const values = Array.from(new Set(group.members.map((member) => member.data[key]).filter(Boolean)));
          return values.length <= 1 ? (values[0] || "") : mixedLabel;
        };
        const matchesUserScope = (data) => {
          if (currentUser.scope === "all") return true;
          if (currentUser.scope === "line:CM") return getProductLineCode(data) === "CM";
          if (currentUser.scope === "line:CS") return getProductLineCode(data) === "CS";
          if (currentUser.scope === "region:海外") return getRegion(data) === "海外";
          if (currentUser.scope === "region:国内") return getRegion(data) === "国内";
          return true;
        };
        const getSolution = (data) => {
          if (data.processRoute === "待处理") return "待产品经理确认处理方案";
          if (data.processRoute === "已转工单") return "已转工单跟进质量排查";
          if (data.processRoute === "已转需求") return "已转需求池评审";
          if (data.processRoute === "已转异常") return "已转异常处理流程";
          if (data.processRoute === "已转Q&A") return "已沉淀至Q&A案例库";
          return "已直接回复并关闭";
        };
        const getExpressNo = (data) => data.returned === "退货" || data.returned === "换货" || data.returned === "退货+换货" ? `RT-${data.id.replace(/[^0-9]/g, "").slice(-8)}` : "";
        const getExcelRow = (data) => ({
          region: getRegion(data),
          dataSource: getDataSource(data),
          deviceType: getDeviceType(data),
          orderNo: data.asin && data.asin !== "-" ? data.asin : data.id.replace("FB-", "ORD-"),
          expressNo: getExpressNo(data),
          image: "",
          video: "",
          solution: getSolution(data),
          addedAt: data.date,
        });

        const allFeedbackItems = () => localFeedbackData;
        const findFeedbackById = (id) => allFeedbackItems().find((item) => item.id === id) || localFeedbackData[0];
        const getCurrentGroups = () => buildMergedFeedback([]);
        const findMergeGroupById = (id) => getCurrentGroups().find((group) => group.members.length > 1 && group.members.some((member) => member.data.id === id));
        const getWorkOrderId = (data) => `TK-${(data.id.match(/\d{8}/)?.[0] || "20260618")}-${data.id.replace(/\D/g, "").slice(-4)}`;
        const addWorkOrderFromFeedback = (data) => {
          if (!data || localWorkOrders.some((item) => item.relatedFeedback === data.id)) return;
          localWorkOrders.unshift({
            id: getWorkOrderId(data),
            relatedFeedback: data.id,
            status: "转工单",
            owner: data.handler || "待分派",
            dept: getProductLineCode(data) === "CM" ? "筋膜枪产品线" : "八电极产品线",

            result: data.level3 || "待补充处理方案",

            step: 1,

          const order = localWorkOrders.find((item) => item.relatedFeedback === data.id);
          if (order) {
            order.owner = data.handler || order.owner;
            order.result = data.level3 || order.result;

        localFeedbackData.forEach(updateWorkOrderFromFeedback);
        const unmergeFeedback = (id) => {
          const item = allFeedbackItems().find((data) => data.id === id);
          if (!item) return;
          item.mergeGroup = "";
          refreshFeedbackTable();
          closeDetailDrawer();
        };
        const getReturnProgress = (data) => {
          if (!data.returned || data.returned === "否") {
            return [
              ["售后状态", "未触发退换货"],
              ["PMS单号", "无"],
              ["当前节点", "无需售后处理"],
              ["更新时间", data.date],

        const actionCell = (data, context = {}) => `

              <button type="button" data-local-action="detail" data-id="${data.id}">详情</button>
              ${context.canUnmerge ? `<button type="button" data-local-action="unmerge" data-id="${data.id}">移出合并</button>` : ""}
              ${needsManualReview(data) ? `<button type="button" class="review" data-local-action="review" data-id="${data.id}">人工复核</button>` : ""}
            </span>
          </td>

        const buildFilterText = (items) => items.map(({ data, confidence }, index) => [
          data.id,
          getDataSource(data),
          getModeLabel(data, confidence, index),
          data.brand,
          data.site,
          getDeviceType(data),
          data.model,
          data.internal,
          data.asin,
          data.raw,
          data.ai,

            .sort((a, b) => Number(b.overdue && !b.tempPlan) - Number(a.overdue && !a.tempPlan));
          const signature = `${JSON.stringify(emergencyFilters)}::${localEmergencyExceptions.length}::${items.map((item) => `${item.id}:${item.status}:${item.step}:${item.tempPlan}:${item.owner}:${item.overdue}:${item.creator}`).join("|")}`;
          if (pageBody?.dataset.localEmergencySignature === signature) return true;
          if (!pageBody) return false;
          pageBody.dataset.localEmergencySignature = signature;
          pageBody.innerHTML = `
            <section class="local-emergency-dashboard">
              <div class="local-emergency-head">
                <div>
                  <h2>紧急异常处理</h2>
                  <p>P0/P1 紧急异常事项跟踪与闭环处理，P2/P3 仅纳入统计观察。</p>
                </div>
                <button type="button" class="primary-button" data-local-new-emergency>+ 新建异常</button>
              </div>
              ${emergencyFiltersHtml()}
              <div class="local-emergency-stats">
                ${emergencyStats.map((stat) => `<article class="local-emergency-stat" style="--accent:${stat.color}"><span>${stat.label}</span><strong>${stat.value}</strong></article>`).join("")}
              </div>
              <div class="local-emergency-card-list">
                ${items.length ? items.map(renderEmergencyCard).join("") : '<article class="local-detail-block"><span>筛选结果</span><strong>暂无匹配的紧急异常。</strong></article>'}
              </div>
            </section>
          `;
          pageBody.querySelector("[data-local-new-emergency]")?.addEventListener("click", openEmergencyCreateModal);
          pageBody.querySelectorAll("[data-emergency-filter]").forEach((field) => {
            field.addEventListener("change", () => {
              emergencyFilters[field.dataset.emergencyFilter] = field.value.trim();
              if (field.dataset.emergencyFilter === "timeType") emergencyFilters.timeValue = "";
              pageBody.dataset.localEmergencySignature = "";
              enhanceEmergencyPage();
            });
            if (field.tagName === "INPUT") {
              field.addEventListener("keydown", (event) => {
                if (event.key !== "Enter") return;
                emergencyFilters[field.dataset.emergencyFilter] = field.value.trim();
                pageBody.dataset.localEmergencySignature = "";
                enhanceEmergencyPage();
              });
            }
          });
          pageBody.querySelector("[data-emergency-filter-reset]")?.addEventListener("click", () => {
            Object.keys(emergencyFilters).forEach((key) => { emergencyFilters[key] = ""; });
            pageBody.dataset.localEmergencySignature = "";
            enhanceEmergencyPage();
          });
          if (pageBody.dataset.localEmergencyActionsReady !== "true") {
            pageBody.dataset.localEmergencyActionsReady = "true";
            pageBody.addEventListener("click", (event) => {
              const detailButton = event.target.closest("[data-emergency-detail]");
              const disposeButton = event.target.closest("[data-emergency-dispose]");
              if (!detailButton && !disposeButton) return;
              event.preventDefault();
              event.stopPropagation();
              const id = detailButton?.dataset.emergencyDetail || disposeButton?.dataset.emergencyDispose;
              const item = localEmergencyExceptions.find((row) => row.id === id);
              if (!item) return;
              if (detailButton) openEmergencyDetail(item);
              if (disposeButton) openEmergencyDisposeModal(item);
            });
          }
          return true;
          } catch (error) {
            console.error("local emergency enhancer failed", error);
            window.__localFeedbackError = error?.message || String(error);
            return false;
          } finally {
            emergencyEnhanceRunning = false;
          }
        };

        const renderCompetitorCard = (item) => `
          <article class="competitor-card local-competitor-card">
            <div class="competitor-badge">新增竞品</div>
            <h3>${escapeHtml(item.name)}</h3>
            <p>${escapeHtml(item.line)} / ${escapeHtml(item.channelType || "未分区")} / ${escapeHtml(item.asin)}</p>
            <div class="local-competitor-tags">${(item.tags || ["品牌竞品"]).map((tag) => `<span>${escapeHtml(tag)}</span>`).join("")}</div>
            <strong>${escapeHtml(item.price)}</strong>
            <span>${escapeHtml(item.channels)}</span>
            <p>${escapeHtml(item.params)}</p>
          </article>
        `;
        const competitorProductTypeOptions = {
          "八电极秤": ["八电极体脂秤", "四电极体脂秤", "体重秤"],
          "体脂秤": ["体脂秤", "体重秤", "智能健康秤"],
          "筋膜枪": ["迷你筋膜枪", "专业筋膜枪", "热敷筋膜枪"],
        };
        const competitorBaseFields = [
          { category: "基础信息", name: "竞品类型", type: "select", required: true, options: ["直接竞争产品", "间接竞争产品"] },
          { category: "基础信息", name: "内部竞品", type: "select", required: false, options: ["否", "是"] },
          { category: "基础信息", name: "品牌", type: "text", required: true, placeholder: "Withings" },
          { category: "基础信息", name: "产品名称", type: "text", required: true, placeholder: "Body Comp" },
          { category: "基础信息", name: "产品型号", type: "text", required: true, placeholder: "WBS08" },
          { category: "基础信息", name: "产品类型", type: "lineSelect", required: true },
          { category: "基础信息", name: "产品定位", type: "select", required: true, options: ["入门级", "大众级", "中端", "高端"] },
          { category: "基础信息", name: "上市时间", type: "text", required: false, placeholder: "YYYY-MM 或 2023年10月" },
          { category: "基础信息", name: "销售平台", type: "text", required: true, placeholder: "Amazon / 天猫 / 京东" },
          { category: "基础信息", name: "销售区域", type: "text", required: true, placeholder: "中国 / 美国 / 加拿大 / 欧洲" },
          { category: "基础信息", name: "竞品链接", type: "url", required: true, placeholder: "商品链接或官网链接" },
          { category: "基础信息", name: "信息来源", type: "text", required: true, placeholder: "平台详情页 / 品牌官网 / 实物样机" },
          { category: "基础信息", name: "信息采集日期", type: "date", required: true },
          { category: "基础信息", name: "信息采集人", type: "text", required: true, placeholder: "填写采集人" },
          { category: "基础信息", name: "信息状态", type: "select", required: true, options: ["正常监控", "待补充", "待校验", "已归档"] },
          { category: "销售信息", name: "官方售价", type: "number", required: false, placeholder: "399.95" },
          { category: "销售信息", name: "到手价", type: "number", required: true, placeholder: "349.95" },
          { category: "销售信息", name: "币种", type: "select", required: true, options: ["USD", "CNY", "EUR", "JPY", "GBP"] },
        ];
        const competitorParamFields = {
          "八电极秤": competitorBaseFields,
          "体脂秤": competitorBaseFields,
          "筋膜枪": competitorBaseFields,
        };
        const openCompetitorModal = () => {
          const fieldControlHtml = (field, line) => {
            const required = field.required ? "必填" : "选填";
            if (field.type === "select") {
              return `<label>${field.name}<select data-comp-param="${field.name}" data-required="${field.required ? "true" : "false"}">${field.options.map((option) => `<option>${option}</option>`).join("")}</select><span class="local-feedback-sub">${field.category} / ${required}</span></label>`;
            }
            if (field.type === "lineSelect") {
              return `<label>${field.name}<select data-comp-param="${field.name}" data-required="true">${competitorProductTypeOptions[line].map((option) => `<option>${option}</option>`).join("")}</select><span class="local-feedback-sub">${field.category} / 必填</span></label>`;
            }
            return `<label>${field.name}<input type="${field.type === "date" ? "date" : field.type === "number" ? "number" : field.type === "url" ? "url" : "text"}" data-comp-param="${field.name}" data-required="${field.required ? "true" : "false"}" placeholder="${field.placeholder || `填写${field.name}`}" /><span class="local-feedback-sub">${field.category} / ${required}</span></label>`;
          };
          const paramFieldsHtml = (line) => `
            <div class="local-competitor-param-grid" data-comp-param-group="${line}">
              <h3>${line}竞品信息登记表字段</h3>
              ${competitorParamFields[line].map((field) => fieldControlHtml(field, line)).join("")}
            </div>
          `;
          openModal(`
            <div class="local-modal">
              <div class="local-modal-head">
                <div><span>竞品信息</span><h2>增加竞品</h2><p>按竞品信息登记表填写，海外渠道必须补充 ASIN。</p></div>
                <button type="button" class="icon-button" data-local-close aria-label="关闭">×</button>
              </div>
              <div class="local-modal-grid">
                <label>竞品名称<input data-comp-field="name" placeholder="例如 Withings Body Scan" /></label>
                <label>渠道类型<select data-comp-field="channelType"><option>海外</option><option>国内</option></select></label>
                <label>ASIN<input data-comp-field="asin" placeholder="海外渠道必填，国内可不填" /></label>
                <label>产品线<select data-comp-field="line"><option>八电极秤</option><option>体脂秤</option><option>筋膜枪</option></select></label>
                <label>价格<input data-comp-field="price" placeholder="$39.99 / ¥399" /></label>
                <label class="wide">渠道<input data-comp-field="channels" placeholder="Amazon / 天猫 / 京东 / 抖音" /></label>
                <div class="wide">
                  <span style="display:block;margin-bottom:6px;color:#475467;font-size:12px;font-weight:800;">竞品标签</span>
                  <div class="local-check-row">
                    <label><input type="checkbox" data-comp-tag value="品牌竞品" checked /> 品牌竞品</label>
                    <label><input type="checkbox" data-comp-tag value="ODM竞品" /> ODM竞品</label>
                  </div>
                </div>
                <div class="local-form-error" data-comp-error></div>
                ${Object.keys(competitorParamFields).map(paramFieldsHtml).join("")}
                <label class="wide">备注<textarea data-comp-field="params" placeholder="补充核心卖点、功能差异、价格策略等备注信息"></textarea></label>
              </div>
              <div class="local-modal-actions">
                <button type="button" class="secondary-button" data-local-close>取消</button>
                <button type="button" class="primary-button" data-local-save-competitor>保存竞品</button>
              </div>
            </div>
          `);
          bindModalClose();
          const lineField = document.querySelector('[data-comp-field="line"]');
          const channelTypeField = document.querySelector('[data-comp-field="channelType"]');
          const asinField = document.querySelector('[data-comp-field="asin"]');
          const syncParamGroups = () => {
            document.querySelectorAll("[data-comp-param-group]").forEach((group) => {
              group.style.display = group.dataset.compParamGroup === lineField?.value ? "grid" : "none";
            });
          };
          const syncAsinRequirement = () => {
            if (!asinField || !channelTypeField) return;
            asinField.placeholder = channelTypeField.value === "海外" ? "海外渠道必填 ASIN" : "国内渠道可不填写";
          };
          lineField?.addEventListener("change", syncParamGroups);
          channelTypeField?.addEventListener("change", syncAsinRequirement);
          syncParamGroups();
          syncAsinRequirement();
          document.querySelector("[data-local-save-competitor]")?.addEventListener("click", () => {
            const value = (key) => document.querySelector(`[data-comp-field="${key}"]`)?.value.trim() || "";
            const error = document.querySelector("[data-comp-error]");
            const channelType = value("channelType") || "海外";
            const asin = value("asin");
            if (channelType === "海外" && !asin) {
              if (error) {
                error.textContent = "海外竞品渠道必须填写 ASIN。";
                error.classList.add("active");
              }
              asinField?.focus();
              return;
            }
            const tags = Array.from(document.querySelectorAll("[data-comp-tag]:checked")).map((box) => box.value);
            const line = value("line") || "八电极秤";
            const missingRequired = [];
            const tableParams = competitorParamFields[line].map((fieldConfig) => {
              const field = Array.from(document.querySelectorAll(`[data-comp-param="${fieldConfig.name}"]`)).find((node) => node.closest("[data-comp-param-group]")?.dataset.compParamGroup === line);
              const fieldValue = field?.value.trim() || "";
              if (fieldConfig.required && !fieldValue) missingRequired.push(fieldConfig.name);
              return `${fieldConfig.name}: ${fieldValue || "待补充"}`;
            });
            if (missingRequired.length) {
              if (error) {
                error.textContent = `请补充必填字段：${missingRequired.join("、")}。`;
                error.classList.add("active");
              }
              return;
            }
            const item = {
              name: value("name") || "未命名竞品",
              asin: asin || "国内渠道未填写",
              line,
              channelType,
              tags: tags.length ? tags : ["品牌竞品"],
              price: value("price") || "待补充",
              channels: value("channels") || "待补充",
              params: [...tableParams, value("params")].filter(Boolean).join("；"),
            };
            localCompetitors.unshift(item);
            closeModal();
            enhanceCompetitionPage(true);
          });
        };

        const enhanceCompetitionPage = (force = false) => {
          const title = document.querySelector("h1")?.textContent.trim();
          if (title !== "竞争分析") return false;
          const tabsText = document.querySelector(".tabs-row")?.textContent || "";
          if (!tabsText.includes("竞品信息")) return false;
          addStyles();
          const tabs = document.querySelector(".tabs-row.compact-tabs, .tabs-row");
          if (tabs && !document.querySelector("[data-local-add-competitor]")) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "primary-button local-competitor-add";
            button.dataset.localAddCompetitor = "true";
            button.textContent = "增加竞品";
            tabs.appendChild(button);
          }
          if (tabs && tabs.dataset.localCompetitorActionsReady !== "true") {
            tabs.dataset.localCompetitorActionsReady = "true";
            tabs.addEventListener("click", (event) => {
              const button = event.target.closest("[data-local-add-competitor]");
              if (!button) return;
              event.preventDefault();
              event.stopPropagation();
              openCompetitorModal();
            });
          }
          document.querySelectorAll("[data-local-competitor-grid]").forEach((node) => node.remove());
          return true;
        };

        const rebuildFeedbackTable = () => {
          const table = document.querySelector(".feedback-table");
          if (!table || table.dataset.localMergedReady === "true") return;
          table.dataset.localMergedReady = "true";
          ensureFeedbackColumns(table);
          const originalRows = getFeedbackRows();
          if (!originalRows.length && !localFeedbackData.length) return;
          const groups = buildMergedFeedback(originalRows);
          const tbody = table.querySelector("tbody");
          tbody.innerHTML = "";
          if (tbody && tbody.dataset.localActionsReady !== "true") {
            tbody.dataset.localActionsReady = "true";
            tbody.addEventListener("change", (event) => {
              if (event.target.matches('.select-column input[type="checkbox"]')) updateBatchSelectedCount();
            });
            tbody.addEventListener("click", (event) => {
              const button = event.target.closest("[data-local-action][data-id]");
              const row = event.target.closest("tr[data-local-id]");
              if (!button && !row) return;
              if (event.target.closest(".local-merge-toggle, input, select, textarea")) return;
              event.preventDefault();
              event.stopPropagation();
              const data = findFeedbackById(button?.dataset.id || row?.dataset.localId);
              if (!button || button.dataset.localAction === "detail") openFeedbackDetail(data);
              if (button?.dataset.localAction === "merge") openManualMergeModal(data);
              if (button?.dataset.localAction === "unmerge") unmergeFeedback(data.id);
              if (button?.dataset.localAction === "review") openReviewModal(data);
            });
          }
          groups.forEach((group) => {
            if (group.members.length === 1) {
              const row = document.createElement("tr");
              renderRowCells(row, group.lead.data, group.lead.confidence, null, { canMerge: true });
              tbody.appendChild(row);
              return;
            }
            const data = group.lead.data;
            const lead = document.createElement("tr");
            lead.dataset.localGroup = "true";
            lead.dataset.localBuilt = "true";
            lead.dataset.localId = data.id;
            lead.dataset.localConfidence = group.lead.confidence.toFixed(2);
            lead.dataset.localMemberCount = String(group.members.length);
            lead.className = "local-merge-parent";
            setRowFilterData(lead, data, group.lead.confidence, 0, group.members);
            const excel = getExcelRow(data);
            const mergeTitle = getMergeTitle(group);
            const mergeDisplayId = getMergeDisplayId(group);
            const mode = group.members.some((member) => member.data.createMode === "人工录入") ? "manual" : "ai";
            const groupRoute = getGroupField(group, "processRoute", "多去向");
            const groupHandler = getGroupField(group, "handler", "多人");
            lead.innerHTML = `
              <td class="select-column"><input type="checkbox" /></td>
              <td class="id-cell"><button type="button" class="local-merge-toggle" aria-expanded="false">+</button><span class="feedback-id-button">${mergeDisplayId}</span></td>
              <td></td>
              <td></td>
              <td>${excel.deviceType}</td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td class="truncate"></td>
              <td class="truncate"></td>
              <td></td>
              <td></td>
              <td></td>
              <td class="truncate"></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td>${groupRoute}</td>
              <td></td>
              <td></td>
              <td>${groupHandler}</td>
              ${actionCell(data)}
            `;
            tbody.appendChild(lead);
            group.members.forEach((member, memberIndex) => {
              const child = document.createElement("tr");
              child.dataset.localBuilt = "true";
              child.dataset.localGroupChild = "true";
              child.className = "local-feedback-child local-feedback-hidden";
              renderRowCells(child, member.data, member.confidence, memberIndex, { canUnmerge: true });
              tbody.appendChild(child);
            });
            const toggle = lead.querySelector(".local-merge-toggle");
            toggle?.addEventListener("click", () => {
              const isOpen = toggle.getAttribute("aria-expanded") === "true";
              toggle.setAttribute("aria-expanded", String(!isOpen));
              toggle.textContent = isOpen ? "+" : "−";
              let open = !isOpen;
              let sibling = lead.nextElementSibling;
              while (sibling && sibling.classList.contains("local-feedback-child")) {
                sibling.classList.toggle("local-feedback-hidden", !open);
                sibling = sibling.nextElementSibling;
              }
              applyFeedbackFilters();
            });
          });
          applyFeedbackFilters();
          updateBatchSelectedCount();
        };

        const bindActions = async () => {
          const toolbar = document.querySelector(".split-page > section.content-main > .toolbar");
          if (!toolbar) return false;
          if (toolbar.dataset.localFeedbackReady === "true") return true;
          toolbar.dataset.localFeedbackReady = "true";
          addStyles();
          enhanceToolbar();
          buildSiteMulti(toolbar);
          const addBtn = toolbar.querySelector("button.primary-button");
          addBtn?.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            setTimeout(openFeedbackModal, 0);
          });
          const templateBtn = Array.from(toolbar.querySelectorAll("button")).find((button) => button.textContent.includes("批量导入"));
          templateBtn?.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            setTimeout(openBatchImportModal, 0);
          });
          const syncBtn = Array.from(toolbar.querySelectorAll("button")).find((button) => button.textContent.includes("同步"));
          syncBtn?.addEventListener("click", applyFeedbackFilters);
          document.querySelectorAll(".batch-action-buttons button").forEach((button) => {
            if (button.dataset.localBatchReady === "true") return;
            button.dataset.localBatchReady = "true";
            button.disabled = false;
            button.removeAttribute("disabled");
            button.setAttribute("aria-disabled", "false");
            button.addEventListener("click", (event) => {
              event.preventDefault();
              event.stopPropagation();
              const text = button.textContent.trim();
              const route = text.includes("工单") ? "已转工单"
                : text.includes("异常") ? "已转异常"
                : text.includes("需求") ? "已转需求"
                : text.includes("Q&A") ? "已转Q&A"
                : "";
              if (route) applyBatchRoute(route);
            });
          });
          let feedbackObserverScheduled = false;
          const observer = new MutationObserver(() => {
            if (feedbackObserverScheduled) return;
            feedbackObserverScheduled = true;
            requestAnimationFrame(() => {
              feedbackObserverScheduled = false;
            try {
              rebuildFeedbackTable();
              enhanceToolbar();
              enhanceWorkOrderPage();
              enhanceEmergencyPage();
              enhanceCompetitionPage();
              setupUserSwitcher();
              syncNavLabels();
              const nativeDrawer = document.querySelector("aside.drawer");
              if (nativeDrawer && !document.querySelector(".local-detail-drawer") && !document.querySelector(".local-detail-page")) {
                const firstVisible = Array.from(document.querySelectorAll("tbody tr[data-local-id]")).find((row) => !row.classList.contains("local-feedback-hidden"));
                nativeDrawer.remove();
                document.querySelector(".split-page")?.classList.remove("with-drawer");
                if (firstVisible) openFeedbackDetail(findFeedbackById(firstVisible.dataset.localId));
              }
            } catch (error) {
              console.error("local feedback observer failed", error);
              window.__localFeedbackError = error?.message || String(error);
            }
            });
          });
          observer.observe(document.body, { childList: true, subtree: true });
          rebuildFeedbackTable();
          enhanceWorkOrderPage();
          enhanceEmergencyPage();
          enhanceCompetitionPage();
          setupUserSwitcher();
          syncNavLabels();
          document.addEventListener("click", (event) => {
            if (!event.target.closest(".local-site-multi")) {
              document.querySelectorAll(".local-site-multi-panel").forEach((panel) => { panel.hidden = true; });
            }
            if (!event.target.closest(".local-modal")) closeModal();
          });
          window.__localFeedbackEnhancerReady = true;
          return true;
        };

        const tryBind = () => {
          try {
            enhanceWorkOrderPage();
            enhanceEmergencyPage();
            enhanceCompetitionPage();
            syncNavLabels();
            return bindActions();
          } catch (error) {
            console.error("local feedback enhancer failed", error);
            window.__localFeedbackError = error?.message || String(error);
            return false;
          }
        };
        let rootObserverScheduled = false;
        const observer = new MutationObserver(() => {
          if (rootObserverScheduled) return;
          rootObserverScheduled = true;
          requestAnimationFrame(() => {
            rootObserverScheduled = false;
            tryBind();
          });
        });

        const start = () => {
          tryBind();
          observer.observe(document.body, { childList: true, subtree: true });
        };

        if (domReady()) start();
        else document.addEventListener("DOMContentLoaded", start, { once: true });
      })();
    </script>
  </body>
</html>
